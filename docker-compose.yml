services:
  database:
    image: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    container_name: flight-booking-db
    ports:
      - 5432:5432
    volumes:
      - ./docker-volume/db:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: flightbooking
      POSTGRES_PASSWORD: 'N0tSoS3cur3!'
    restart: on-failure

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      database:
        condition: service_healthy
    container_name: flight-booking
    ports:
      - 8080:8080
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    restart: on-failure