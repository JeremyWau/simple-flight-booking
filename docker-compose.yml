services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flight-booking
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    restart: on-failure